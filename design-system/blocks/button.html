<div style="display: flex; gap: var(--spacing-md); align-items: center;">
  <button style="display: inline-flex; align-items: center; padding: var(--spacing-sm) var(--spacing-lg); background: var(--color-primary); color: #fff; font-family: var(--font-family); font-size: var(--font-size-body); font-weight: var(--font-weight-medium); border: none; border-radius: var(--border-radius-md); cursor: pointer; letter-spacing: -0.01em;">Deploy</button>
  <button style="display: inline-flex; align-items: center; padding: var(--spacing-sm) var(--spacing-lg); background: var(--color-background); color: var(--color-primary); font-family: var(--font-family); font-size: var(--font-size-body); font-weight: var(--font-weight-medium); border: 1px solid var(--color-border); border-radius: var(--border-radius-md); cursor: pointer; letter-spacing: -0.01em;">Cancel</button>
  <button style="display: inline-flex; align-items: center; padding: var(--spacing-sm) var(--spacing-lg); background: #EFF6FF; color: var(--color-accent); font-family: var(--font-family); font-size: var(--font-size-body); font-weight: var(--font-weight-medium); border: none; border-radius: var(--border-radius-md); cursor: pointer; letter-spacing: -0.01em;">View</button>
</div>
